<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goblin's Meme Barrel Surprise - Dopamine Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Press Start 2P', monospace; background: linear-gradient(135deg, #0f0f0f, #1a0033); overflow-x: hidden; }
        .rarity-common { border: 3px solid #22c55e; }
        .rarity-rare { border: 3px solid #3b82f6; }
        .rarity-epic { border: 3px solid #a855f7; }
        .rarity-legendary { border: 3px solid #facc15; box-shadow: 0 0 20px #facc15; }
        .rarity-multi { border: 3px solid #ff00ff; box-shadow: 0 0 30px #ff00ff; animation: glow 1.5s infinite alternate; }
        @keyframes glow { from { opacity: 0.8; } to { opacity: 1; } }
        #goblin { transition: all 0.5s ease; cursor: pointer; }
        #goblin.clicked { transform: rotateY(180deg) scale(1.05); }
        @keyframes reach-in { 0%, 100% { transform: rotateY(180deg); } 50% { transform: rotateY(180deg) translateY(-20px); } }
        #goblin.reaching { animation: reach-in 1.5s ease-in-out; }
        #item { animation: pull-out 0.8s ease-out forwards; }
        @keyframes pull-out { from { transform: scale(0.5) translateY(50px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        .collection-slot { width: 100px; height: 100px; border: 2px dashed #666; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center; cursor: pointer; transition: transform 0.3s; }
        .collection-slot:hover { transform: scale(1.1); }
        .collection-slot.selected { box-shadow: 0 0 15px #fff; }
        .collection-slot.collected { border-style: solid; background: rgba(255,255,255,0.1); }
        .collection-slot img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; }
        /* Particle Effects */
        .particles { position: absolute; pointer-events: none; }
        .particle { position: absolute; width: 10px; height: 10px; border-radius: 50%; animation: particle-float 1s ease-out forwards; }
        @keyframes particle-float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
        .common-particle { background: #22c55e; }
        .rare-particle { background: #3b82f6; }
        .epic-particle { background: #a855f7; }
        .legendary-particle { background: #facc15; animation-duration: 1.5s; box-shadow: 0 0 10px #facc15; }
        .multi-particle { background: linear-gradient(45deg, #ff00ff, #00ffff); animation-duration: 2s; box-shadow: 0 0 15px #ff00ff; }
        /* Anti-Autoclicker Pop-up */
        #anti-auto {
            position: absolute;
            pointer-events: none;
            z-index: 9999;
            font-size: 40px;
            display: none;
            animation: angry-shake 0.5s infinite;
        }
        @keyframes angry-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @media (max-width: 600px) { 
            h1 { font-size: 1.5rem; }
            .text-xl { font-size: 1rem; }
            button { font-size: 0.8rem; padding: 8px 16px; }
            #game-container { width: 100%; height: auto; min-height: 300px; }
            .collection-slot { width: 70px; height: 70px; }
            .collection-slot img { width: 50px; height: 50px; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-white">
    <h1 class="text-3xl mb-4 text-green-400 tracking-widest">🗑️ Goblin's Meme Barrel Surprise</h1>
    
    <div id="game-container" class="relative w-[400px] h-[500px] bg-black border-4 border-green-500 rounded-2xl p-8 mb-6 shadow-2xl">
        <!-- Goblin Image (your uploaded PNG - raw GitHub URL) -->
        <img id="goblin" src="https://raw.githubusercontent.com/GoblinBugGirl/Goblingame/main/IMG_0543.jpeg" alt="Goblin" class="absolute top-8 left-12 w-[320px] transition-all duration-500 hover:scale-105">
        
        <!-- Pulled Item Display -->
        <div id="item-display" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-transparent hidden">
            <img id="item" class="w-full h-full object-contain rounded-lg shadow-lg" alt="Meme Item">
            <div id="rarity-label" class="absolute -bottom-8 left-1/2 transform -translate-x-1/2 text-xs font-bold bg-black px-2 py-1 rounded whitespace-nowrap"></div>
        </div>
        
        <!-- Particles Container -->
        <div id="particles" class="absolute inset-0 overflow-hidden pointer-events-none"></div>
        
        <!-- Instructions -->
        <p class="absolute bottom-4 left-1/2 transform -translate-x-1/2 text-xs text-center text-green-300">Click goblin to pull memes! Fuse for hybrids! Endless dopamine! ✨</p>
    </div>

    <!-- Stats -->
    <div class="flex gap-8 mb-6 text-xl">
        <div>Score: <span id="score" class="text-green-400 font-bold">0</span></div>
        <div>High Score: <span id="high-score" class="text-yellow-400 font-bold">0</span></div>
        <div>Collected: <span id="collected-count" class="text-blue-400 font-bold">0</span>/<span id="total-items">0</span></div>
    </div>

    <!-- Collection Index (Pokedex-style grid) -->
    <div class="w-full max-w-4xl mb-8">
        <h2 class="text-2xl mb-4 text-purple-400 text-center">🗂️ Meme Collection Index</h2>
        <div id="collection-grid" class="collection-grid justify-center"></div>
    </div>

    <!-- Fuse Button (hidden until 2+ selected) -->
    <button id="fuse-btn" class="hidden bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-xl font-bold text-sm transition-all mb-4">Fuse Selected Memes!</button>

    <!-- Controls -->
    <div class="flex gap-4">
        <button id="reset-btn" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl font-bold text-sm transition-all">Reset Game</button>
        <button id="export-btn" class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-xl font-bold text-sm transition-all">Export Save</button>
    </div>

    <!-- Anti-Autoclicker Pop-up -->
    <div id="anti-auto" class="text-red-500">😡</div>

    <!-- Audio Elements (REPLACE URLs with hosted MP3s) -->

    <audio id="sound-legendary" src="https://example.com/legendary-fanfare.mp3"></audio> 
    <audio id="sound-multi" src="https://example.com/multi-fusion-explosion.mp3"></audio>

</body>
</html>
